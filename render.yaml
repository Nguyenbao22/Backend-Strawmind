services:
  - type: web
    name: strawmind
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 24.15.0
      - key: CLIENT_ORIGIN
        value: "*"
      - key: MQTT_HOST
        value: 3b8fa1f55fa44b14a8def756f361a0c1.s1.eu.hivemq.cloud
      - key: MQTT_PORT
        value: 8883
      - key: MQTT_TOPIC_PREFIX
        value: strawmind
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
